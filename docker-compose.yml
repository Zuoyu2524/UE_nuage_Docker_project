version: '3.8'

services:
  redis:
    image: redis:alpine
    volumes:
      - ./healthchecks:/healthchecks
    healthcheck:
      test: ["CMD", "bash", "/healthchecks/redis.sh"]
    networks:
      - back-tier

  db:
    image: postgres:alpine
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./healthchecks:/healthchecks
    environment:
      POSTGRES_DB: voting
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD", "bash", "/healthchecks/postgres.sh"]
    networks:
      - back-tier

  worker:
    build:
      context: ./worker
    container_name: worker
    depends_on:
      - redis
      - db
    networks:
      - back-tier

  vote1:
    build: ./vote
    ports:
    #port host machine:port container
      - "5000:5000"
    networks:
      - front-tier
      - back-tier

  vote2:
    build: ./vote
    ports:
      - "5001:5000"
    networks:
      - front-tier
      - back-tier

  result:
    build: ./result
    container_name: result
    ports:
      - "5002:5000"
    networks:
      - front-tier
      - back-tier

  seed:
    build: ./seed-data
    container_name: seed
    depends_on:
      - nginx
    networks:
      - front-tier

  nginx:
    build: ./nginx
    container_name: nginx
    networks:
      - front-tier

volumes:
  db-data:

networks:
  front-tier: {}
  back-tier: {}
